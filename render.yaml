services:
  - type: web
    name: lead-capture
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_DIR
        value: /data
      - key: RESEND_API_KEY
        sync: false
      - key: EXPORT_SECRET
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: BCC_EMAIL
        sync: false
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
